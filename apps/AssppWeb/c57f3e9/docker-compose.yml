services:
  lobe-chat:
    image: ghcr.io/lakr233/assppweb:c57f3e9
    container_name: ${CONTAINER_NAME}
    restart: unless-stopped
    networks:
      - 1panel-network
    volumes:
      - ./data:/data
    ports:
      - "${PANEL_APP_PORT_HTTP}:8080"
    environment:
      - DATA_DIR=/data
      - PORT=8080
    labels:
      createdBy: "Apps"
    logging:
      driver: "json-file"
      options:
        max-size: "128m"
        max-file: "5"
networks:
  1panel-network:
    external: true
